<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KERN | SYSTEM</title>
    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: rgba(10, 10, 10, 0.85);
            --border-color: #222;
            --border-focus: #444;
            --text-main: #d1d1d1;
            --text-muted: #666;
            --text-bright: #fff;
            --accent-alert: #ff3333;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: "Consolas", "Courier New", Courier, monospace;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Единый стиль для всех аватаров (ИСПРАВЛЕНО) */
        .avatar-uniform {
            width: 70px;
            height: 70px;
            border: 1px solid var(--border-color);
            object-fit: cover;
            filter: grayscale(100%) contrast(120%);
            margin-right: 20px;
        }

        .system-card {
            background-color: #0a0a0a;
            border: 1px solid var(--border-color);
            padding: 15px;
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 600px;
            margin-bottom: 15px;
        }

        .card-info { text-align: left; }
        .rank-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; }
        .rank-name { font-weight: bold; color: var(--text-bright); }
        .status-badge { font-size: 0.6rem; color: var(--text-muted); margin-top: 4px; }

        .divider { width: 80px; height: 2px; background-color: var(--border-focus); margin: 30px 0; }
        .header-img { width: 100%; max-width: 450px; }
        h1 { font-size: 3rem; letter-spacing: 12px; margin: 20px 0; color: #fff; }
    </style>
</head>
<body>

    <img src="emblem.png" alt="KERN" class="header-img">
    <h1>KERN</h1>
    <div class="divider"></div>

    <div class="hierarchy-box" style="width: 100%; max-width: 600px;">
        
        <div class="system-card">
            <img src="order.jpg" alt="ORDER" class="avatar-uniform">
            <div class="card-info">
                <div class="rank-label">Supreme Commander</div>
                <div class="rank-name">OberKommandant</div>
            </div>
        </div>
        
        <div class="system-card" style="border-left: 4px solid #fff;">
            <img src="cross.jpg" alt="MAJOR" class="avatar-uniform">
            <div class="card-info">
                <div class="rank-label">System Moderator</div>
                <div class="rank-name">Major der Sturmartillerie</div>
                <div class="status-badge">ACTIVE DUTY // ENFORCER</div>
            </div>
        </div>

        <div class="system-card">
            <img src="user1.jpg" alt="UNIT" class="avatar-uniform">
            <div class="card-info">
                <div class="rank-name">Unit_01</div>
                <div class="status-badge">ONLINE</div>
            </div>
        </div>

        <div class="system-card">
            <img src="user2.jpg" alt="UNIT" class="avatar-uniform">
            <div class="card-info">
                <div class="rank-name">Unit_02</div>
                <div class="status-badge">ONLINE</div>
            </div>
        </div>

    </div>

</body>
</html>
